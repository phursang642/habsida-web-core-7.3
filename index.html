<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>slider</title>
    <link rel="stylesheet" href="style.css">
    <link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
/>
</head>
<body> 
    <section class="brands">
        <h2>REPAIR OF EQUIPMENT FROM VARIOUS BRANDS</h2>

        <!--swiper for mobile only-->
        <div class="swiper brand-list">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="logos/Brand Card.svg" alt="Brand 1"></div>
                <div class="swiper-slide"><img src="logos/Brand Card (1).svg" alt="Brand 2"></div>
                <div class="swiper-slide"><img src="logos/Brand Card (2).svg" alt="Brand 3"></div>
                <div class="swiper-slide"><img src="logos/Brand Card (3).svg" alt="Brand 4"></div>
                <div class="swiper-slide"><img src="logos/Brand Card (4).svg" alt="Brand 5"></div>
                <div class="swiper-slide"><img src="logos/Brand Card (5).svg" alt="Brand 6"></div>
                <div class="swiper-slide"><img src="logos/Brand Card (6).svg" alt="Brand 7"></div>
                <div class="swiper-slide"><img src="logos/Brand Card (7).svg" alt="Brand 8"></div>
                <div class="swiper-slide"><img src="logos/Brand Card (8).svg" alt="Brand 9"></div>
                <div class="swiper-slide"><img src="logos/Brand Card (9).svg" alt="Brand 10"></div>
                <div class="swiper-slide"><img src="logos/Brand Card (10).svg" alt="Brand 11"></div>
                
            </div>
            <div class="swiper-pagination"></div>
        </div>


        <div class="brand-grid">
            <div class="brand-item"><img src="logos/Brand Card.svg" alt="Brand 1"></div>
            <div class="brand-item"><img src="logos/Brand Card (1).svg" alt="Brand 2"></div>
            <div class="brand-item"><img src="logos/Brand Card (2).svg" alt="Brand 3"></div>
            <div class="brand-item"><img src="logos/Brand Card (3).svg" alt="Brand 4"></div>
            <div class="brand-item"><img src="logos/Brand Card (4).svg" alt="Brand 5"></div>
            <div class="brand-item"><img src="logos/Brand Card (5).svg" alt="Brand 6"></div>
            <div class="brand-item"><img src="logos/Brand Card (6).svg" alt="Brand 7"></div>
            <div class="brand-item"><img src="logos/Brand Card (7).svg" alt="Brand 8"></div>
            <div class="brand-item"><img src="logos/Brand Card (8).svg" alt="Brand 9"></div>
            <div class="brand-item"><img src="logos/Brand Card (9).svg" alt="Brand 10"></div>
            <div class="brand-item"><img src="logos/Brand Card (10).svg" alt="Brand 11"></div>
        </div>
        <button class="brand-toggle"><span>Show all</span>
            <img src="logos/icon.svg" alt="Arrow">
        </button>

    </section>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="script.js"></script>
    
</body>
</html>
